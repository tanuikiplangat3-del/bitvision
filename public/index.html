<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitvision WiFi Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Auth: one screen with Sign in / Sign up tabs (always both available) -->
  <div id="auth-screen" class="auth-screen" hidden>
    <div class="auth-card">
      <div class="brand">
        <div class="logo-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <div><h1>Bitvision</h1><p class="brand-sub">WiFi Management System</p></div>
      </div>

      <div class="auth-tabs">
        <button type="button" id="tab-signin" class="auth-tab active">Sign in</button>
        <button type="button" id="tab-signup" class="auth-tab">Sign up</button>
      </div>

      <!-- SIGN IN -->
      <form id="login-form" class="auth-panel">
        <label>Username
          <input type="text" id="login-username" autocomplete="username" required />
        </label>
        <label>Password
          <input type="password" id="login-password" autocomplete="current-password" required />
        </label>
        <div id="login-error" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <!-- SIGN UP (creates the first owner account) -->
      <form id="setup-form" class="auth-panel" hidden>
        <p class="auth-note">Create the owner account. This is your super admin and can do everything. (Only works for the very first account.)</p>
        <label>Your name
          <input type="text" id="setup-name" placeholder="e.g. James Owner" />
        </label>
        <label>Username
          <input type="text" id="setup-username" autocomplete="username" placeholder="Choose a username" />
        </label>
        <label>Password
          <input type="password" id="setup-password" autocomplete="new-password" placeholder="At least 6 characters" />
        </label>
        <div id="setup-error" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block">Create account &amp; sign in</button>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app" hidden>
    <aside class="sidebar">
      <div class="brand brand-sm">
        <div class="logo-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <div><h1>Bitvision</h1></div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-foot">
        <div class="whoami">
          <div id="me-name" class="me-name"></div>
          <div id="me-role" class="me-role"></div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Sign out</button>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button id="menu-toggle" class="menu-toggle" aria-label="Menu">☰</button>
        <h2 id="page-title">Dashboard</h2>
        <div id="topbar-action"></div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
